name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      # Encrypt password-protected posts (front-matter `protected: true`) with
      # StatiCrypt AFTER htmlproofer and BEFORE upload, so the deployed pages
      # are real AES-encrypted HTML. The shared password lives in the
      # STATICRYPT_PASSWORD repository secret (Settings → Secrets and variables
      # → Actions). The list of pages to encrypt is read from the build-time
      # manifest /assets/protected.json, which is deleted before deploy.
      - name: Encrypt protected posts
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          set -euo pipefail
          SITE="_site${{ steps.pages.outputs.base_path }}"
          MANIFEST="$SITE/assets/protected.json"

          # Nothing flagged as protected → nothing to do.
          if [ ! -f "$MANIFEST" ] || [ "$(jq 'length' "$MANIFEST")" -eq 0 ]; then
            echo "No protected posts found. Skipping encryption."
            rm -f "$MANIFEST"
            exit 0
          fi

          # Fail loudly rather than publish protected posts in clear text.
          if [ -z "${STATICRYPT_PASSWORD:-}" ]; then
            echo "::error::Protected posts found but the STATICRYPT_PASSWORD secret is not set. Aborting to avoid publishing them unencrypted."
            exit 1
          fi

          npm install -g staticrypt@3

          mapfile -t urls < <(jq -r '.[]' "$MANIFEST")
          for url in "${urls[@]}"; do
            f="${SITE}${url}index.html"
            if [ ! -f "$f" ]; then
              echo "::warning::Protected page not found, skipping: $f"
              continue
            fi
            tmp="$(mktemp -d)"
            # `--short` skips StatiCrypt's interactive "short password" prompt
            # (which would hang in CI). `< /dev/null` is a belt-and-braces
            # guard against any other prompt blocking on stdin.
            ( cd "$(dirname "$f")" && staticrypt index.html \
                --password "$STATICRYPT_PASSWORD" \
                --config false \
                --short \
                --template-title "Protected writeup" \
                --template-instructions "This writeup is password-protected. Enter the password to read it." \
                --directory "$tmp" < /dev/null )
            mv "$tmp/index.html" "$f"
            rm -rf "$tmp"
            echo "Encrypted: $f"
          done

          # Don't ship the manifest listing which posts are protected.
          rm -f "$MANIFEST"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
