<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />

        <!--
            Custom StatiCrypt password template, styled to match the site's dark
            theme. The structural ids/classes (staticrypt_loading,
            staticrypt_content, staticrypt-form, staticrypt-password,
            staticrypt-remember, .staticrypt-toggle-password-visibility) and the
            entire <script> block are required by StatiCrypt and must not be
            renamed. `%%POST_IMAGE%%` is replaced per-post by the CI workflow.
        -->
        <style>
            :root {
                color-scheme: dark;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
            }

            .staticrypt-body {
                margin: 0;
                background: #1b1b1e;
                color: #ccc;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Source Sans Pro", Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                min-height: 100%;
                background: #1b1b1e;
            }

            .lock-wrap {
                max-width: 720px;
                margin: 0 auto;
                padding: 3rem 1.25rem 4rem;
            }

            .lock-back {
                display: inline-block;
                margin-bottom: 1.5rem;
                color: rgb(138 180 248);
                text-decoration: none;
                font-size: 0.9rem;
            }

            .lock-back:hover {
                text-decoration: underline;
            }

            .lock-title {
                margin: 0 0 1.5rem;
                font-size: 2rem;
                font-weight: 700;
                letter-spacing: -0.01em;
                color: #e8e8e8;
            }

            .lock-banner {
                display: block;
                width: 100%;
                max-width: 500px;
                margin: 0 auto 2.5rem;
                border-radius: 12px;
            }

            .lock-card {
                max-width: 440px;
                margin: 0 auto;
                padding: 2rem 1.75rem;
                text-align: center;
                background: #1e1e1e;
                border: 1px solid #2c2d2d;
                border-radius: 14px;
                box-shadow: 0 12px 32px -14px rgba(0, 0, 0, 0.7);
            }

            .lock-icon {
                width: 2.4rem;
                height: 2.4rem;
                margin: 0 auto 0.75rem;
                color: #9fef00;
            }

            .lock-icon svg {
                width: 100%;
                height: 100%;
                fill: currentColor;
            }

            .lock-instructions {
                margin: 0 0 1.5rem;
                color: #9a9a9a;
                line-height: 1.55;
            }

            .staticrypt-password-container {
                position: relative;
                display: flex;
                align-items: center;
                margin: 0 0 1rem;
                background: #161618;
                border: 1px solid #37373a;
                border-radius: 10px;
                overflow: hidden;
                transition: border-color 0.15s ease, box-shadow 0.15s ease;
            }

            .staticrypt-password-container:focus-within {
                border-color: rgb(112 114 115);
                box-shadow: 0 0 0 3px rgb(159 239 0 / 18%);
            }

            .staticrypt-password-container input[type="password"],
            .staticrypt-password-container input[type="text"] {
                flex: 1;
                width: 100%;
                box-sizing: border-box;
                background: transparent;
                border: 0;
                outline: 0;
                color: #e8e8e8;
                font-size: 1rem;
                padding: 0.85rem 2.6rem 0.85rem 1rem;
            }

            .staticrypt-password-container input::placeholder {
                color: #6f7173;
            }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                right: 0.55rem;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                padding: 6px;
                cursor: pointer;
                opacity: 0.5;
                filter: invert(1);
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.85;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                margin-bottom: 1rem;
                color: #9a9a9a;
                font-size: 0.9rem;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
            }

            .staticrypt-decrypt-button {
                width: 100%;
                border: 0;
                border-radius: 10px;
                padding: 0.85rem;
                cursor: pointer;
                background: #9fef00;
                color: #10160a;
                font-size: 0.95rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                transition: filter 0.15s ease;
            }

            .staticrypt-decrypt-button:hover,
            .staticrypt-decrypt-button:active,
            .staticrypt-decrypt-button:focus {
                filter: brightness(0.9);
                outline: 0;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1b1b1e;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid #444;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-password-container input[type="password"],
                .staticrypt-password-container input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

            </main>
        </div>

        <script>
            // these variables will be filled when generating the file - the template format is '/*[|variable_name|]*/0'
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",

            // you can edit these values to customize some of the behavior of StatiCrypt
            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            // init the staticrypt engine
            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password
            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been
                // replaced, no need to do anything
                if (!isSuccessful) {
                    // hide loading screen
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

            const imgSrcEyeOpened =

                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;

            // handle password form submission
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);
