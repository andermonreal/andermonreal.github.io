#  The contact options.

- type: github
  icon: "fab fa-github"

- type: linkedin
  icon: "fab fa-linkedin"
  url: "https://www.linkedin.com/in/ander-monreal-ayanz-485794291"

# Plain, reliable mailto link. We use the type `mail` (not `email`) on purpose:
# the theme's built-in `email` handler wraps the address in a `javascript:` URL
# that many browsers/OSes silently ignore. The `mail` type falls through to the
# generic handler and renders a normal `mailto:` anchor instead.
- type: mail
  icon: "fas fa-envelope"
  url: "mailto:andermonreal2003@gmail.com"
  noblank: true # open link in current tab

# Hack The Box profile. Font Awesome has no HTB logo, so `htb-icon` is a
# custom class styled in assets/css/jekyll-theme-chirpy.scss using the official
# SVG as a CSS mask (so it inherits the sidebar icon colour + hover).
# `type` doubles as the link's aria-label in the theme, so we use a readable
# label here. It falls through to the generic handler (not a built-in type),
# rendering a normal anchor with our custom `htb-icon`.
- type: Hack The Box
  icon: "htb-icon"
  url: "https://app.hackthebox.com/users/1723818"
